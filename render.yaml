# Infra-as-code para Render — https://render.com/docs/blueprint-spec
# Importalo una vez desde el dashboard de Render ("New → Blueprint") y crea
# el servicio `tech-radar-api`. Las variables marcadas con `sync: false`
# tenés que completarlas vos en el dashboard (Render no las guarda en git).
#
# IMPORTANTE: NO usamos `rootDir: apps/api`. Es un monorepo npm workspaces
# y el package.json raíz es donde viven los workspaces; si Render hace
# `cd apps/api` antes de `npm install`, falla con "No workspaces found".
# Los comandos corren desde la raíz del repo y apuntan al workspace
# correcto con `--workspace apps/api`.

services:
  - type: web
    name: tech-radar-api
    runtime: node
    plan: free
    region: oregon                       # cámbialo si querés más cerca de LATAM
    # `--include=dev` es crítico: el blueprint define NODE_ENV=production,
    # y bajo esa condición `npm install` omite las devDependencies por
    # defecto — incluido TypeScript, con lo cual `tsc -p tsconfig.json`
    # del paso de build falla con "tsc: not found". Forzar --include=dev
    # durante el build.
    buildCommand: npm ci --include=dev && npm run build --workspace apps/api
    startCommand: npm run start --workspace apps/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Cada 6h en prod: con skip-already-enriched el costo de IA ya es
      # bajísimo, pero sincronizar menos seguido multiplica el ahorro. La
      # UI escucha SSE así que los usuarios ven los eventos nuevos apenas
      # termina un sync — la frecuencia no afecta la frescura percibida.
      - key: SYNC_INTERVAL_MINUTES
        value: 360
      # Cookie cross-site: web en Vercel (*.vercel.app) y api en Render (*.onrender.com)
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_COOKIE_SECURE
        value: true
      # Dejar vacío: cookie host-only para el dominio de la API.
      - key: AUTH_COOKIE_DOMAIN
        value: ""
      # Completar en el dashboard:
      - key: CORS_ORIGIN           # ej. https://tech-radar-latam.vercel.app
        sync: false
      - key: DATABASE_URL          # Neon pooled connection string (?sslmode=require)
        sync: false
      - key: PG_SSL
        value: true
      - key: GOOGLE_CLIENT_ID      # OAuth 2.0 Web Client ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET  # solo si usás el flujo de exchange PKCE desde mobile
        sync: false
      - key: AUTH_SESSION_SECRET   # `openssl rand -base64 48`
        generateValue: true
      - key: SYNC_API_KEY          # para el ping keepalive + cron
        generateValue: true
      # IA cloud (Ollama se omite automáticamente en producción):
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
